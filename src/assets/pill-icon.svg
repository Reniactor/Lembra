<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" fill="none">
  <defs>
    <linearGradient id="pill-fill-l" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f5b070"/>
      <stop offset="100%" stop-color="#f0a060"/>
    </linearGradient>
    <linearGradient id="pill-fill-r" x1="50%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e08040"/>
      <stop offset="100%" stop-color="#c86a30"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="left-half">
      <rect x="6" y="12" width="22" height="32"/>
    </clipPath>
    <clipPath id="right-half">
      <rect x="28" y="12" width="22" height="32"/>
    </clipPath>
  </defs>

  <!-- Soft glow behind pill -->
  <ellipse cx="28" cy="30" rx="18" ry="12" fill="#f0a060" opacity="0.06" filter="url(#glow)"/>

  <!-- Left half of pill (lighter) -->
  <rect x="10" y="16" width="36" height="24" rx="12" ry="12" fill="url(#pill-fill-l)" clip-path="url(#left-half)"/>

  <!-- Right half of pill (darker) -->
  <rect x="10" y="16" width="36" height="24" rx="12" ry="12" fill="url(#pill-fill-r)" clip-path="url(#right-half)"/>

  <!-- Center seam -->
  <line x1="28" y1="16.5" x2="28" y2="39.5" stroke="#1a1410" stroke-width="1.5" opacity="0.3"/>

  <!-- Top shine/highlight -->
  <rect x="10" y="16" width="36" height="12" rx="12" ry="12" fill="url(#shine)" opacity="0.6"/>

  <!-- Subtle outline -->
  <rect x="10" y="16" width="36" height="24" rx="12" ry="12" stroke="#f5b070" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Small specular highlight on left -->
  <ellipse cx="19" cy="23" rx="5" ry="3" fill="#fff" opacity="0.12" transform="rotate(-15 19 23)"/>
</svg>
